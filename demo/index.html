<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVIGO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #000;
      --white:  #fff;
      --yellow: #ffe000;
      --red:    #ff2800;
      --bg:     #f0ede6;
      --b:      3px solid #000;
      --sh:     5px 5px 0 #000;
    }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: 'Courier New', Courier, monospace;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      border: var(--b);
      background: var(--black);
      color: var(--yellow);
      padding: 1.5rem 2rem;
      margin-bottom: 0;
      position: relative;
    }

    header h1 {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }

    header .sub {
      font-size: .75rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #888;
      margin-top: .4rem;
    }

    header .tag {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-size: .65rem;
      letter-spacing: .2em;
      padding: .2rem .5rem;
      text-transform: uppercase;
    }

    /* ── STATS ──────────────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-left: var(--b);
      border-bottom: var(--b);
      border-right: var(--b);
      background: var(--white);
      margin-bottom: 2rem;
    }

    .stat-card {
      padding: 1.1rem 1rem .9rem;
      border-right: var(--b);
    }

    .stat-card:last-child { border-right: none; }

    .stat-card:first-child { background: var(--yellow); }

    .stat-card .label {
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: .3rem;
    }

    .stat-card:first-child .label { color: #555; }

    .stat-card .value {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 2.1rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.02em;
    }

    .bbox-row {
      border-left: var(--b);
      border-right: var(--b);
      border-bottom: var(--b);
      background: var(--white);
      padding: .5rem 1rem;
      font-size: .7rem;
      letter-spacing: .05em;
      color: #555;
      margin-bottom: 2rem;
      margin-top: -2rem; /* flush under stats */
    }

    /* ── SECTION TITLES ─────────────────────────────────────────────── */
    .section-title {
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: var(--black);
      color: var(--white);
      display: inline-block;
      padding: .25rem .7rem;
      margin-bottom: 0;
    }

    /* ── CANVAS ─────────────────────────────────────────────────────── */
    .canvas-wrap {
      border: var(--b);
      background: var(--white);
      margin-bottom: .5rem;
    }

    canvas { display: block; }

    .legend {
      display: flex;
      gap: 1.5rem;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2rem;
      padding: .4rem 0;
      border-bottom: 1px solid #ccc;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid var(--black);
      margin-right: .3em;
      vertical-align: middle;
    }

    .legend-dot.peak   { background: var(--red); }
    .legend-dot.valley { background: var(--white); }
    .legend-dot.climb  { background: var(--yellow); }

    /* ── CLIMBS ─────────────────────────────────────────────────────── */
    #climbs-list { margin-bottom: 3rem; }

    .climb-card {
      border: var(--b);
      border-top: none;
      background: var(--white);
      display: grid;
      grid-template-columns: 90px 1fr;
      align-items: stretch;
    }

    .climb-card:first-child { border-top: var(--b); }

    .climb-card:nth-child(odd) .climb-metrics { background: #f7f7f7; }

    .climb-rank {
      background: var(--black);
      color: var(--yellow);
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: var(--b);
      padding: .75rem .5rem;
      letter-spacing: -.02em;
    }

    .climb-metrics {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }

    .metric {
      padding: .6rem .9rem;
      border-right: 1px solid #ddd;
      min-width: 72px;
    }

    .metric:last-child { border-right: none; }

    .metric .label {
      font-size: .55rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #888;
      display: block;
      margin-bottom: .15rem;
    }

    .metric .val {
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 1.15rem;
      letter-spacing: -.01em;
      font-weight: 900;
    }

    .metric.score .val { color: var(--red); }

    .empty {
      border: var(--b);
      padding: 1.5rem;
      font-size: .8rem;
      letter-spacing: .08em;
      color: #888;
      background: var(--white);
    }

    /* ── FOOTER ─────────────────────────────────────────────────────── */
    footer {
      border-top: var(--b);
      padding-top: 1rem;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    footer a { color: var(--black); }
  </style>
</head>
<body>

  <header>
    <div class="tag">WASM / RUST</div>
    <h1>Navigo</h1>
    <div class="sub">GPS trace analysis &mdash; compiled to WebAssembly</div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Distance</div>
      <div class="value" id="stat-distance">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Elev. gain</div>
      <div class="value" id="stat-gain">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Elev. loss</div>
      <div class="value" id="stat-loss">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Locations</div>
      <div class="value" id="stat-locations">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Climbs</div>
      <div class="value" id="stat-climbs">—</div>
    </div>
  </div>

  <div class="bbox-row" id="stat-bbox">&nbsp;</div>

  <div class="section-title">Elevation profile</div>
  <div class="canvas-wrap">
    <canvas id="profile"></canvas>
  </div>
  <div class="legend">
    <span><span class="legend-dot peak"></span>peak</span>
    <span><span class="legend-dot valley"></span>valley</span>
    <span><span class="legend-dot climb"></span>climb zone</span>
  </div>

  <div class="section-title">Detected climbs</div>
  <div id="climbs-list"></div>

  <footer>
    <span>navigo &mdash; MIT license</span>
    <a href="https://github.com/totorototo/navigo" target="_blank">github.com/totorototo/navigo</a>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
