<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAVIGO</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --black: #000;
        --white: #fff;
        --yellow: #ffe000;
        --red: #ff2800;
        --bg: #f0ede6;
        --b: 3px solid #000;
        --sh: 5px 5px 0 #000;
      }

      body {
        background: var(--bg);
        color: var(--black);
        font-family: "Courier New", Courier, monospace;
        padding: 2rem;
        max-width: 900px;
        margin: 0 auto;
      }

      /* ── HEADER ─────────────────────────────────────────────────────── */
      header {
        border: var(--b);
        background: var(--black);
        color: var(--yellow);
        padding: 1.5rem 2rem;
        margin-bottom: 0;
        position: relative;
      }

      header h1 {
        font-family: Impact, "Arial Black", sans-serif;
        font-size: clamp(3rem, 10vw, 6rem);
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        text-transform: uppercase;
      }

      header .sub {
        font-size: 0.75rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #888;
        margin-top: 0.4rem;
      }

      header .tag {
        position: absolute;
        top: 1rem;
        right: 1.25rem;
        border: 2px solid var(--yellow);
        color: var(--yellow);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        padding: 0.2rem 0.5rem;
        text-transform: uppercase;
      }

      /* ── STATS ──────────────────────────────────────────────────────── */
      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border-left: var(--b);
        border-bottom: var(--b);
        border-right: var(--b);
        background: var(--white);
        margin-bottom: 2rem;
      }

      .stat-card {
        padding: 1.1rem 1rem 0.9rem;
        border-right: var(--b);
      }

      .stat-card:last-child {
        border-right: none;
      }

      .stat-card:first-child {
        background: var(--yellow);
      }

      .stat-card .label {
        font-size: 0.6rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #555;
        margin-bottom: 0.3rem;
      }

      .stat-card:first-child .label {
        color: #555;
      }

      .stat-card .value {
        font-family: Impact, "Arial Black", sans-serif;
        font-size: 2.1rem;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
      }

      .bbox-row {
        border-left: var(--b);
        border-right: var(--b);
        border-bottom: var(--b);
        background: var(--white);
        padding: 0.5rem 1rem;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        color: #555;
        margin-bottom: 2rem;
        margin-top: -2rem; /* flush under stats */
      }

      /* ── SECTION TITLES ─────────────────────────────────────────────── */
      .section-title {
        font-size: 0.65rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        background: var(--black);
        color: var(--white);
        display: inline-block;
        padding: 0.25rem 0.7rem;
        margin-bottom: 0;
      }

      /* ── CANVAS ─────────────────────────────────────────────────────── */
      .canvas-wrap {
        border: var(--b);
        background: var(--white);
        margin-bottom: 0.5rem;
      }

      canvas {
        display: block;
      }

      .legend {
        display: flex;
        gap: 1.5rem;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #555;
        margin-bottom: 2rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #ccc;
      }

      .legend-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid var(--black);
        margin-right: 0.3em;
        vertical-align: middle;
      }

      .legend-dot.peak {
        background: var(--red);
      }
      .legend-dot.valley {
        background: var(--white);
      }
      .legend-dot.climb {
        background: var(--yellow);
      }

      /* ── CLIMBS ─────────────────────────────────────────────────────── */
      #climbs-list {
        margin-bottom: 3rem;
      }

      .climb-card {
        border: var(--b);
        border-top: none;
        background: var(--white);
        display: grid;
        grid-template-columns: 90px 1fr;
        align-items: stretch;
      }

      .climb-card:first-child {
        border-top: var(--b);
      }

      .climb-card:nth-child(odd) .climb-metrics {
        background: #f7f7f7;
      }

      .climb-rank {
        background: var(--black);
        color: var(--yellow);
        font-family: Impact, "Arial Black", sans-serif;
        font-size: 1.8rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: var(--b);
        padding: 0.75rem 0.5rem;
        letter-spacing: -0.02em;
      }

      .climb-metrics {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
      }

      .metric {
        padding: 0.6rem 0.9rem;
        border-right: 1px solid #ddd;
        min-width: 72px;
      }

      .metric:last-child {
        border-right: none;
      }

      .metric .label {
        font-size: 0.55rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #888;
        display: block;
        margin-bottom: 0.15rem;
      }

      .metric .val {
        font-family: Impact, "Arial Black", sans-serif;
        font-size: 1.15rem;
        letter-spacing: -0.01em;
        font-weight: 900;
      }

      .metric.score .val {
        color: var(--red);
      }

      .empty {
        border: var(--b);
        padding: 1.5rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        color: #888;
        background: var(--white);
      }

      /* ── DATA TABLES ────────────────────────────────────────────────── */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        margin-bottom: 2rem;
        border: var(--b);
        background: var(--white);
      }

      .data-table thead tr {
        background: var(--black);
        color: var(--yellow);
        font-size: 0.58rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .data-table th {
        padding: 0.45rem 0.7rem;
        text-align: left;
        font-weight: 400;
      }

      .data-table td {
        padding: 0.45rem 0.7rem;
        border-bottom: 1px solid #e0e0e0;
        vertical-align: middle;
      }

      .data-table tbody tr:last-child td {
        border-bottom: none;
      }

      .data-table tbody tr:nth-child(even) {
        background: #f7f7f7;
      }

      .data-table td.num {
        font-family: "Courier New", monospace;
        white-space: nowrap;
      }

      .data-table td.muted {
        color: #999;
      }

      .data-table td.gain {
        color: #228b22;
      }

      .data-table td.loss {
        color: var(--red);
      }

      .data-table td.stars {
        letter-spacing: -0.05em;
        color: var(--black);
      }

      .data-table td.leg-label {
        font-size: 0.68rem;
        color: #333;
      }

      /* ── TYPE BADGES ────────────────────────────────────────────────── */
      .type-badge {
        display: inline-block;
        font-size: 0.55rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 0.15rem 0.45rem;
        border: 1.5px solid currentColor;
        white-space: nowrap;
      }

      .type-start {
        color: #006400;
        border-color: #006400;
      }
      .type-arrival {
        color: var(--red);
        border-color: var(--red);
      }
      .type-lifebase {
        color: #b8600a;
        border-color: #b8600a;
        background: #fff8e0;
      }
      .type-barrier {
        color: #555;
        border-color: #aaa;
      }

      /* ── RACE TITLE ─────────────────────────────────────────────────── */
      #race-title {
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #ccc;
        margin-top: 0.5rem;
      }

      /* ── RACE SWITCHER ──────────────────────────────────────────────── */
      .race-switcher {
        margin-top: 1rem;
      }

      #race-select {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: var(--yellow);
        color: var(--black);
        border: 2px solid var(--yellow);
        padding: 0.45rem 0.6rem;
        width: 100%;
        max-width: 320px;
        cursor: pointer;
      }

      footer {
        border-top: var(--b);
        padding-top: 1rem;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #888;
        display: flex;
        justify-content: space-between;
      }

      footer a {
        color: var(--black);
      }

      /* ── RESPONSIVE ─────────────────────────────────────────────────── */
      @media (max-width: 599px) {
        body {
          padding: 1rem;
        }

        header {
          padding: 1rem;
        }

        header .tag {
          position: static;
          display: inline-block;
          margin-bottom: 0.5rem;
        }

        .stats {
          grid-template-columns: repeat(2, 1fr);
        }

        .stat-card {
          border-bottom: var(--b);
        }

        .stat-card .value {
          font-size: 1.6rem;
        }

        /* right column: no right border */
        .stat-card:nth-child(2n) {
          border-right: none;
        }

        /* last card alone in its row: span both columns */
        .stat-card:last-child:nth-child(odd) {
          grid-column: 1 / -1;
          border-right: none;
          border-bottom: none;
        }

        /* last card already in right column (even card count) */
        .stat-card:last-child:nth-child(2n) {
          border-bottom: none;
        }

        footer {
          flex-direction: column;
          gap: 0.5rem;
        }

        /* ── Data tables → card layout ── */
        .data-table {
          display: block;
          border: none;
          margin-bottom: 0;
        }

        .data-table thead {
          display: none;
        }

        .data-table tbody,
        .data-table tr {
          display: block;
        }

        .data-table tr {
          border: var(--b);
          border-top: none;
          padding: 0.75rem 1rem;
        }

        .data-table tr:first-child {
          border-top: var(--b);
        }

        .data-table td {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          padding: 0.2rem 0;
          border-bottom: 1px solid #eee;
          gap: 1rem;
        }

        .data-table td:last-child {
          border-bottom: none;
        }

        .data-table td::before {
          content: attr(data-label);
          font-size: 0.5rem;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: #888;
          white-space: nowrap;
          flex-shrink: 0;
          padding-top: 0.15rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="tag">WASM / RUST</div>
      <h1>Navigo</h1>
      <div class="sub">GPS trace analysis &mdash; compiled to WebAssembly</div>
      <div id="race-title"></div>
      <div class="race-switcher">
        <select id="race-select"></select>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Distance</div>
        <div class="value" id="stat-distance">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Elev. gain</div>
        <div class="value" id="stat-gain">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Elev. loss</div>
        <div class="value" id="stat-loss">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Locations</div>
        <div class="value" id="stat-locations">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Climbs</div>
        <div class="value" id="stat-climbs">—</div>
      </div>
    </div>

    <div class="bbox-row" id="stat-bbox">&nbsp;</div>

    <p class="empty" id="status-message" style="display: none"></p>

    <div class="section-title">Elevation profile</div>
    <div class="canvas-wrap">
      <canvas id="profile"></canvas>
    </div>
    <div class="legend">
      <span><span class="legend-dot peak"></span>peak</span>
      <span><span class="legend-dot valley"></span>valley</span>
      <span><span class="legend-dot climb"></span>climb zone</span>
    </div>

    <div class="section-title">Detected climbs</div>
    <div id="climbs-list"></div>

    <div class="section-title">Checkpoints</div>
    <div id="waypoints-list"></div>

    <div class="section-title">Sections</div>
    <div id="sections-list"></div>

    <div class="section-title">Stages</div>
    <div id="stages-list"></div>

    <footer>
      <span>navigo &mdash; MIT license</span>
      <a href="https://github.com/totorototo/navigo" target="_blank"
        >github.com/totorototo/navigo</a
      >
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
